<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Casos de Código · Cooperativo</title>
    <link rel="icon" href="images/detective-face.svg">
    <link rel="stylesheet" href="./styles/select-cases.css">
    <script src="scripts/auth_guard.js"></script>
</head>

<body>
    <div class="container">
        <div class="computer-container">
            <div class="monitor">
                <div class="monitor-inner">
                    <div class="screen-container">
                        <div class="screen" id="game-screen-area">
                            <button id="btn-voltar-mobile" class="mobile-only-btn">VOLTAR</button>
                            <div class="glow-overlay"></div>
                            <div class="selection-interface">
                                <div id="case-title">SALA COOPERATIVA</div>
                                <div id="room-info" style="text-align:center; padding:10px;">
                                    <p>Código da sala: <strong id="room-code-display"></strong></p>
                                    <p>Jogador: <strong id="player-nickname"></strong></p>
                                </div>
                                <div class="case-list-scroll" id="case-list">
                                    <p style="text-align: center; margin-top: 20px;">CARREGANDO CASOS...</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="monitor-bottom">
                    <div class="exit-switch" id="btn-exit-case" title="Sair da sala">
                        <div class="button"></div>
                    </div>
                    <div class="power-switch" id="power-btn-container">
                        <div class="button"></div>
                    </div>
                    <div class="power-led" id="power-led"></div>
                </div>
            </div>
        </div>
    </div>
    <button id="mobile-power-btn">LIGAR TERMINAL</button>
    <audio id="music-loop" src="./audio/music-loop.mp3" loop></audio>
    <audio id="sfx-power" src="./audio/startup_button.mp3"></audio>
    <script type="module" src="scripts/practice-room.js"></script>
</body>

</html>
