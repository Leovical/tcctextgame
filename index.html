<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <title>Casos de Código</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="images/detective-face.svg">
    <link rel="stylesheet" href="styles/menu.css" />
    <script src="scripts/auth_guard.js"></script>
</head>

<body>
    <main class="menu">
        <header class="menu-header">
            <h2 class="subtitle">AGÊNCIA DE INVESTIGAÇÃO ESPECIAL</h2>
            <h1 class="title">CASOS DE CÓDIGO</h1>
        </header>

        <img src="images/detective.png" alt="Detetive sombrio" class="detective" />

        <div class="action-buttons">
            <a href="select-cases.html" class="action-button">
                <span>Jogar</span>
            </a>
            <button id="tournament-btn" class="action-button">
                <span>Torneio</span>
            </button>
        </div>

        <button class="settings-button" aria-label="Configurações">
            <img src="images/settings.png" alt="" />
        </button>
    </main>

    <div id="settings-modal" class="settings-modal hidden">
        <div class="settings-window">
            <h3>CONFIGURAÇÕES</h3>
            <div class="setting-row">
                <label for="volume-slider">VOLUME</label>
                <input type="range" id="volume-slider" min="0" max="1" step="0.05" />
            </div>
            <button id="settings-close">FECHAR</button>
        </div>
    </div>

    <div id="team-modal" class="settings-modal hidden">
        <div class="settings-window">
            <h3>ACESSO AO TORNEIO</h3>
            <div class="setting-row">
                <label for="team-code-input">CÓDIGO DO TIME</label>
                <input type="text" id="team-code-input" placeholder="Ex: ABC123">
            </div>
            <div class="team-modal-buttons">
                <button id="team-modal-cancel" class="team-modal-btn">CANCELAR</button>
                <button id="team-modal-confirm" class="team-modal-btn">VALIDAR</button>
            </div>
            <p id="team-modal-error"></p>
        </div>
    </div>

    <div id="member-modal" class="settings-modal hidden">
        <div class="settings-window">
            <h3>ESCOLHA SUA MATRÍCULA</h3>
            <div class="member-list" id="member-list"></div>
            <div class="team-modal-buttons">
                <button id="member-modal-cancel" class="team-modal-btn">CANCELAR</button>
                <button id="member-modal-confirm" class="team-modal-btn">SELECIONAR</button>
            </div>
            <p id="member-modal-error" class="team-modal-error"></p>
        </div>
    </div>

    <div id="play-mode-modal" class="settings-modal hidden">
        <div class="settings-window">
            <h3>MODO DE JOGO</h3>
            <div class="team-modal-buttons">
                <button id="play-solo" class="team-modal-btn">SINGLE PLAYER</button>
                <button id="play-coop" class="team-modal-btn">COOPERATIVO</button>
            </div>
            <button id="play-mode-cancel" class="team-modal-btn">CANCELAR</button>
        </div>
    </div>

    <div id="nickname-modal" class="settings-modal hidden">
        <div class="settings-window">
            <h3>ESCOLHA UM APELIDO</h3>
            <input type="text" id="nickname-input" placeholder="Apelido" maxlength="20">
            <div class="team-modal-buttons center">
                <button id="nickname-confirm" class="team-modal-btn">CONFIRMAR</button>
            </div>
        </div>
    </div>

    <div id="coop-action-modal" class="settings-modal hidden">
        <div class="settings-window">
            <h3>COOPERATIVO</h3>
            <div class="team-modal-buttons">
                <button id="create-room-btn" class="team-modal-btn">CRIAR SALA</button>
                <button id="join-room-btn" class="team-modal-btn">ENTRAR EM SALA</button>
            </div>
        </div>
    </div>

    <div id="deck-modal" class="settings-modal hidden">
        <div class="settings-window">
            <h3>ESCOLHA O DECK</h3>
            <div id="deck-list" class="member-list"></div>
            <button id="deck-confirm" class="team-modal-btn" disabled>SELECIONAR DECK</button>
            <p id="deck-error" class="team-modal-error"></p>
        </div>
    </div>

    <div id="join-room-modal" class="settings-modal hidden">
        <div class="settings-window">
            <h3>ENTRAR EM SALA</h3>
            <input type="text" id="room-code-input" placeholder="Código da sala">
            <button id="join-room-confirm" class="team-modal-btn">ENTRAR</button>
            <p id="join-room-error" class="team-modal-error"></p>
        </div>
    </div>

    <script type="module" src="scripts/coop-flow.js"></script>
    <script type="module" src="scripts/team-login-modal.js"></script>
    <script type="module" src="scripts/audio_settings.js"></script>
    <audio id="intro-music" src="audio/intro_theme.mp3" loop autoplay></audio>
</body>

</html>
