<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Casos de Código · Torneio</title>
    <link rel="icon" href="images/detective-face.svg">
    <link rel="stylesheet" href="./styles/select-cases.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="scripts/auth_guard.js"></script>
    <script type="module" src="scripts/audio_settings.js"></script>
    <script type="module" src="scripts/team-select.js"></script>
</head>

<body>
    <div class="container">
        <div class="computer-container">
            <div class="monitor">
                <div id="player-info" class="player-info"></div>
                <div class="monitor-inner">
                    <div class="screen-container">
                        <div class="screen" id="game-screen-area">
                            <button id="btn-voltar-mobile" class="mobile-only-btn">VOLTAR</button>
                            <div class="glow-overlay"></div>
                            <div class="selection-interface">
                                <div id="case-title">ESCOLHA UM</div>
                                <div id="member-selection" class="member-selection" style="display: none;">
                                    <label for="member-select" class="member-label">Escolha sua matrícula:</label>
                                    <select id="member-select" class="member-select"></select>
                                </div>
                                <div class="case-list-scroll" id="case-list">
                                    <p style="text-align: center; margin-top: 20px;">CARREGANDO DADOS...</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="monitor-bottom">
                    <div class="volume-knob-container" title="Ajustar Volume">
                        <div class="volume-knob" id="hw-volume-knob">
                            <div class="knob-indicator"></div>
                        </div>
                    </div>

                    <div id="volume-hud" class="volume-hud hidden">
                        <label>VOLUME</label>
                        <div class="hud-slider-wrapper">
                            <input type="range" id="hw-volume-slider" min="0" max="1" step="0.05" value="0.3">
                        </div>
                    </div>

                    <div class="monitor-controls-right">
                        <div class="exit-switch" id="btn-exit-case" title="Retornar">
                            <div class="button"></div>
                        </div>
                        <div class="power-switch" id="power-btn-container">
                            <div class="button"></div>
                        </div>
                        <div class="power-led" id="power-led"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <button id="mobile-power-btn">LIGAR TERMINAL</button>

    <audio id="music-loop" src="./audio/music-loop.mp3" loop></audio>
    <audio id="sfx-power" src="./audio/startup_button.mp3"></audio>
</body>

</html>
